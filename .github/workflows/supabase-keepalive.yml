# .github/workflows/supabase-keepalive.yml

name: Supabase Keep-Alive

on:
  schedule:
    - cron: "0 12 */3 * *" # runs every 3 days at noon UTC
  workflow_dispatch: # lets you trigger it manually from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -sf \
            "${{ secrets.SUPABASE_URL }}/auth/v1/health"
          echo "Supabase ping successful"
